name: Security Audit

on:
  push:
    paths:
      - "javascript_backend/**"
      - "python_backend/**"
      - "prototype/**"
  pull_request:
    paths:
      - "javascript_backend/**"
      - "python_backend/**"
      - "prototype/**"
  schedule:
    - cron: "0 0 * * 0" # Weekly run (every Sunday at midnight)

jobs:
  security_audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------- JavaScript backend audit ----------
      - name: Install JS backend dependencies
        working-directory: javascript_backend
        run: npm install

      - name: Run npm audit (JavaScript backend)
        working-directory: javascript_backend
        run: npm audit --omit=dev --audit-level=high

      # ---------- Frontend audit ----------
      - name: Install prototype dependencies
        working-directory: prototype
        run: npm install

      - name: Run npm audit (Prototype)
        working-directory: prototype
        run: npm audit --omit=dev --audit-level=high

      # ---------- Python backend audit ----------
      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install python
        working-directory: python_backend
        run: uv python install

      - name: Install python dependencies
        working-directory: python_backend
        run: uv sync --frozen

      - name: Run uv audit
        working-directory: python_backend
        run: uv audit --preview-features audit
